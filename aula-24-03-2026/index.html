<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Aula 24-03-2026: Eventos - propriedades e addEventListener</h1>
    <hr>
    <h2>Propriedade:</h2>
    <button id="botao1">Clique Aqui</button>
    <button id="botao2">Posicione o mouse aqui</button>
    <br><br>
    <label for="">Digite aqui:</label>
    <input type="text" placeholder="Digite aqui" id="campoEntrada">
    <p>Você digitou: <span id="resultado"></span></p>

    <hr>
    <h2>AddEventListener</h2>
    <button id="botao3">Clique Aqui</button>
    <p id="mensagem1"></p>
    <p id="mensagem2"></p>

    <h2>Arrastar o elemento</h2>
    <div id="caixa" draggable="true">
        [CAIXA]
    </div>
    <br><br>
    <div id="area">
        [SOLTE AQUI]
    </div>


    <script src="script.js"></script>
</body>
</html>
